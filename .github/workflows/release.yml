name: Release

on:
  pull_request:
    types: [closed]

jobs:
  create-release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from meson.build
        id: version
        run: |
          VERSION=$(grep -Po "version:\s*'\K[0-9.]+(?=')" meson.build)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog from appdata
        id: changelog
        run: |
          python3 << 'PYTHON_SCRIPT' >> $GITHUB_OUTPUT
          import xml.etree.ElementTree as ET
          tree = ET.parse('data/io.github.alainm23.planify.metainfo.xml.in.in')
          root = tree.getroot()
          version = '${{ steps.version.outputs.version }}'
          print('changelog<<EOF')
          desc = root.find('.//release[@version="' + version + '"]/description')
          if desc is not None:
              for elem in desc:
                  if elem.tag == 'p' and elem.text:
                      print(elem.text.strip())
                      print()
                  elif elem.tag == 'ul':
                      for li in elem.findall('li'):
                          print(f"- {li.text.strip()}")
                      print()
          print('EOF')
          PYTHON_SCRIPT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Planify ${{ steps.version.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-dmg:
    needs: create-release
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Release')
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from meson.build
        id: version
        run: |
          VERSION=$(grep -Po "version:\s*'\K[0-9.]+(?=')" meson.build)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          brew update
          brew install vala meson ninja gtk4 libadwaita libgee json-glib \
            libsoup sqlite libical gtksourceview5 libsecret icu4c gxml \
            pango cairo fontconfig librsvg dylibbundler create-dmg \
            --cask font-adwaita

      - name: Build
        run: |
          export PKG_CONFIG_PATH="/opt/homebrew/opt/libical/lib/pkgconfig:/opt/homebrew/opt/icu4c/lib/pkgconfig:${PKG_CONFIG_PATH}"
          meson setup build \
            -Dspelling=disabled \
            -Dportal=false \
            -Devolution=false \
            -Dgxml-0.20:docs=false
          meson compile -C build
          glib-compile-schemas data

      - name: Generate DMG
        run: |
          chmod +x scripts/build-macos-dmg.sh
          ./scripts/build-macos-dmg.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: build/Planify.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
